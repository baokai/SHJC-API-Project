						let yAxis = data.yAxis || []

						let legendLine = data.legendLine || []

						let seriesArr = []
						let legendArr = []

							legendArr.push({
								name: legendBar && legendBar.length > 0 && legendBar[index]
							})

								name: legendBar && legendBar.length > 0 && legendBar[index],
								type: 'bar',
								barGap: '0.5px',
								data: item,
								barWidth: data.barWidth || 12,

									normal: {
										show: false,
										formatter: '{c}' + symbol,
										position: 'top',

											color: '#000',

											fontFamily: '微软雅黑',

										},
									},

										borderWidth:1,
										borderColor:'#ddd',

							seriesArr,
							legendArr

								var str = '';

									time = i.name.replace(/\n/g, '') + '<br/>';
									if (i.data == 'null' || i.data == null) {
										str += i.seriesName + '：无数据' + '<br/>'
									} else {
										str += i.seriesName + '：' + i.data
									}
								}
								return time + str;

								},

							splitNumber: 4,
						},

					}
					myChart1.setOption(option1);
						},
						error: function(err){console.log(err)}
					})
					
				}
			}

					$.ajax({
						url: root + 'GetProjectCountBySource',
						type: 'GET',
						data: {},
						success: ((res)=>{
							let datas = res.data
							// console.log(datas)
							for(let i = 0;i<datas.length;i++){
								if(datas[i].ProjectSource==1){
									this.mark1 = datas[i].ProjectCount
								}
								if(datas[i].ProjectSource==2){
									this.mark2 = datas[i].ProjectCount
								}
								if(datas[i].ProjectSource==3){

								}

						}),

					})
				}
			}
